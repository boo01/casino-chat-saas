services:
  # PostgreSQL 16 - Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: casino-chat-postgres
    environment:
      POSTGRES_USER: casino_chat
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: casino_chat_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casino_chat -d casino_chat_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - casino-chat-network
    restart: unless-stopped

  # Redis 7 - Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: casino-chat-redis
    command:
      - redis-server
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - casino-chat-network
    restart: unless-stopped

  # Adminer - Database Management UI (for development only)
  adminer:
    image: adminer:latest
    container_name: casino-chat-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - casino-chat-network
    restart: unless-stopped
    profiles:
      - debug

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  casino-chat-network:
    driver: bridge
    name: casino-chat-network
