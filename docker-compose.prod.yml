services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    env_file: .env.production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - casino-chat-network

  admin:
    build:
      context: ./packages/admin
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    restart: always
    networks:
      - casino-chat-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casino_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-casino_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casino_chat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - casino-chat-network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - casino-chat-network

volumes:
  postgres_data:
  redis_data:

networks:
  casino-chat-network:
    driver: bridge
